<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>EisenLookup - Battle Facilities lookup tool</title>
</head>
<body>
    <header>
        <div id="mode-control" title="Battle mode">
            <button id="mode-glyph" aria-label="Cycle battle mode">⚀</button>
            <div id="mode-switch"><!-- cells generated by app.js --></div>
        </div>
        <div class="trainer-select-container">
            <div class="trainer-select" id="trainer-side-1">
                <select id="trainer-dropdown-1"></select>
            </div>
            <div class="trainer-select" id="trainer-side-2" style="display: none;">
                <select id="trainer-dropdown-2"></select>
            </div>
        </div>
        <!-- Battle Hall: type + rank selectors replace the trainer menu -->
        <div class="trainer-select-container" id="hall-select-container" style="display: none;">
            <div class="trainer-select"><select id="hall-type"></select></div>
            <div class="trainer-select"><select id="hall-rank"></select></div>
        </div>
        <button id="settings-btn" aria-label="Settings">
            <span class="icon-mask icon-settings"></span>
        </button>
    </header>
    <div class="main-content">
        <div class="quote-select-container">
            <div class="quote-select" id="quote-side-1">
                <select id="quote-dropdown-1"></select>
            </div>
            <div class="quote-select" id="quote-side-2" style="display: none;">
                <select id="quote-dropdown-2"></select>
            </div>
            <!-- Battle Pyramid wild Pokémon: the quote menu becomes a round-quote
                 filter, with small Round + Floor filters to its right. -->
            <div class="pyramid-wild-filter" id="pyramid-wild-filter" style="display: none;">
                <div class="pwf-quote"><select id="pwf-quote"></select></div>
                <div class="pwf-small"><select id="pwf-round"></select></div>
                <div class="pwf-small"><select id="pwf-floor"></select></div>
            </div>
            <!-- Battle Hall: faced-level calculator replaces the quote dropdown -->
            <div class="hall-level-tool" id="hall-level-tool" style="display: none;">
                <label class="hall-field">
                    <span id="hall-level-label">Level</span>
                    <input type="number" id="hall-player-level" min="30" max="100" inputmode="numeric" />
                </label>
                <label class="hall-field">
                    <span id="hall-rank2-label"># rank 2+</span>
                    <span class="hall-info" id="hall-rank2-info" tabindex="0" role="img" aria-label="info">&#9432;</span>
                    <input type="number" id="hall-rank2" min="0" max="17" inputmode="numeric" />
                </label>
            </div>
        </div>
        <!-- BDSP team view: a trainer's possible teams preview here as compact
             rows; picking one renders its sets side-by-side in #pokemon-menus. -->
        <div id="team-rows"></div>
        <div id="pokemon-menus"><!-- slot containers generated by ui.js --></div>
    </div>
    <!-- Reverse Lookup: find the trainer from the Pokémon seen (BDSP only — toggled
         by updateLayout on variant.reverseLookup). Sits above the reset button. The
         icon (a "?" + person) uses currentColor so it theme-tints like the others. -->
    <button id="reverse-lookup-btn" aria-label="Reverse lookup" title="Reverse lookup" style="display: none;">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor" aria-hidden="true">
            <text x="5.5" y="13.5" font-size="14" font-weight="bold" text-anchor="middle">?</text>
            <circle cx="16" cy="6.5" r="3"></circle>
            <path d="M11.2 21v-4.2a4.8 4.8 0 0 1 9.6 0V21z"></path>
        </svg>
    </button>
    <button id="reset-btn" aria-label="Reset selections">
        <span class="icon-mask icon-reset"></span>
    </button>
    <div id="reverse-lookup-modal" class="modal">
        <div class="modal-content">
            <div class="reverse-header">
                <h2 id="reverse-lookup-title">Reverse Lookup</h2>
                <span class="close">&times;</span>
            </div>
            <!-- species (and, in the roster model, set) menus, built by ui.js. In multis
                 this splits into two sides, each with its own results list. -->
            <div id="reverse-menus"></div>
            <!-- matching trainers/duos as rows; clicking a row loads it in the main tool
                 (used by the single-list singles/doubles modes; multis builds per-side
                 result lists inside #reverse-menus instead). -->
            <div id="reverse-results"></div>
        </div>
        <!-- reset (clears the menus) — bottom-right, mirroring the main reset button -->
        <button id="reverse-reset" type="button" aria-label="Reset reverse lookup" title="Reset">
            <span class="icon-mask icon-reset"></span>
        </button>
    </div>
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <!-- game select + close (×) on one row: × sits to the right of the menu -->
            <div class="game-row">
                <select id="game-select"></select>
                <span class="close">&times;</span>
            </div>
            <div id="variant-row">
                <div id="variant-pills"><!-- pill buttons generated by app.js --></div>
            </div>
            <div id="facility-row"><!-- gen-4: facilities under the version pills -->
                <div id="facility-pills"><!-- pill buttons generated by app.js --></div>
            </div>
            <div id="factory-level-row" style="display: none;"><!-- Battle Factory: sits under the facility pills -->
                <div id="factory-level" class="factory-level-toggle">
                    <button class="factory-level-opt active" data-open="">Level 50</button>
                    <button class="factory-level-opt" data-open="1">Open Level</button>
                </div>
            </div>
            <div id="factory-streak-row" style="display: none;"><!-- Gen-3 Factory: current Tower streak determines opponent IVs (glitch) -->
                <label class="hall-field">
                    <span id="factory-streak-label">Current Tower streak</span>
                    <input type="number" id="factory-streak" min="0" max="9999" inputmode="numeric" />
                    <span class="hall-info" id="factory-streak-info" tabindex="0" role="img" aria-label="info">&#9432;</span>
                </label>
            </div>
            <div id="open-level-row" style="display: none;"><!-- Gen-3 Tower: Lv 50 / Open Level (+ level input for Open) -->
                <div id="open-level" class="factory-level-toggle">
                    <button class="open-level-opt active" data-open="">Level 50</button>
                    <button class="open-level-opt" data-open="1">Open Level</button>
                </div>
                <label class="open-level-input" id="open-level-input-wrap" style="display: none;">
                    <span id="open-level-label">Level</span>
                    <input type="number" id="open-level-value" min="60" max="100" inputmode="numeric" />
                </label>
            </div>
            <div id="facility-links" style="display: none;"><!-- external helper-tool links for the selected facility --></div>
            <hr class="settings-divider">
            <div id="language-flags"><!-- flag buttons generated by app.js --></div>
            <hr class="settings-divider">
            <!-- toggle rows; on mobile they flow into one horizontal row (see styles.css) -->
            <div id="settings-toggles">
                <div id="late-filter-row">
                    <button id="late-filter" class="settings-toggle-btn" title="Late trainers only">50+</button>
                    <button id="factory-late-21" class="settings-toggle-btn" style="display: none;" title="Battle 21+ trainers">21+</button>
                    <button id="factory-late-49" class="settings-toggle-btn" style="display: none;" title="Battle 49+ trainers">49+</button>
                    <button id="pyramid-140" class="settings-toggle-btn" style="display: none;" title="Floor 140+ : wild Pokémon IVs become 15-31">140+</button>
                </div>
                <div id="sprites-row">
                    <button id="sprites-toggle" class="settings-toggle-btn" title="Show minisprites">
                        <img src="assets/images/minisprites/bulbasaur.png" alt="Minisprites">
                    </button>
                </div>
                <div id="multis-row"><!-- mobile only: mode switch is hidden there -->
                    <button id="multis-toggle" class="settings-toggle-btn" title="Multi Battles">2v2</button>
                </div>
            </div>
            <hr class="settings-divider">
            <!-- theme picker lives at the BOTTOM (rarely changed once chosen) -->
            <div id="theme-swatches"><!-- swatches generated by app.js --></div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script type="module" src="scripts/app.js"></script>
</body>
</html>
